name: Bytecode 5.5

on:
  schedule:
    # Every Monday morning, at 4:44 UTC
    - cron: '44 4 * * 1'
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/common.yml
    with:
      compiler_ref: refs/heads/5.5
      options: bytecode-only
      timeout: 240
