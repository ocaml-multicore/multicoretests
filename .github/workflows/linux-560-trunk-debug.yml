name: Linux trunk debug

on:
  schedule:
    # Every Monday morning, at 5:55 UTC
    - cron: '55 5 * * 1'
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/common.yml
    with:
      compiler_ref: refs/heads/trunk
      dune_profile: 'debug-runtime'
      runparam: 's=4096,V=1'
      timeout: 240
